<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tsvsheet</title>
<style>
  :root {
    --ink: #1b2733;
    --paper: #fbfaf6;
    --rule: #d9d6cc;
    --rule-strong: #b9b5a8;
    --head: #6b7a86;
    --head-bg: #f0ede4;
    --formula: #f7f1e2;
    --formula-mark: #c98a1a;
    --err: #b3261e;
    --err-bg: #fbe9e7;
    --accent: #1f5c8a;
    --precedent-bg: #e4eef6;
    --dependent: #3f8f5b;
    --dependent-bg: #e6f2ea;
    --embed: #6a4b9c;
    --embed-bg: #efe9f6;
    --dirty: #c98a1a;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #d8dee6; --paper: #12161b; --rule: #29313a; --rule-strong: #3a444f;
      --head: #7d8b98; --head-bg: #1a1f26; --formula: #221d12; --formula-mark: #d7a24a;
      --err: #ff6b5e; --err-bg: #2a1613; --accent: #5aa0d6; --dirty: #d7a24a;
      --precedent-bg: #14202b; --dependent: #5cae79; --dependent-bg: #16241b;
      --embed: #b394e0; --embed-bg: #1e1729;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--mono); color: var(--ink); background: var(--paper);
    display: flex; flex-direction: column; font-size: 13px; line-height: 1.4;
  }
  header {
    display: flex; align-items: baseline; gap: 1rem; padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--rule-strong); flex-wrap: wrap;
  }
  header .mark { font-weight: 700; letter-spacing: 0.02em; }
  header .mark b { color: var(--accent); }
  header .hint { color: var(--head); font-size: 12px; }
  header .spacer { flex: 1; }
  .state { font-size: 12px; color: var(--head); }
  .state.dirty { color: var(--dirty); }
  .state.dirty::before { content: "● "; }
  button {
    font-family: var(--mono); font-size: 12px; color: var(--ink); background: var(--head-bg);
    border: 1px solid var(--rule-strong); padding: 0.3rem 0.8rem; cursor: pointer; border-radius: 2px;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .formula-bar {
    display: flex; align-items: stretch; border-bottom: 1px solid var(--rule-strong);
  }
  .formula-bar .addr {
    min-width: 3.5rem; padding: 0.4rem 0.6rem; background: var(--head-bg); color: var(--head);
    border-right: 1px solid var(--rule); text-align: center; font-weight: 600;
  }
  #formula {
    flex: 1; border: none; background: transparent; color: var(--ink);
    font-family: var(--mono); font-size: 13px; padding: 0.4rem 0.8rem;
  }
  #formula:focus { outline: none; background: var(--head-bg); }
  #formula::placeholder { color: var(--head); }
  main { flex: 1; overflow: auto; padding: 1rem; }
  .diagnostics { max-height: 25%; overflow: auto; padding: 0 1rem 0.6rem; }
  .diag { color: var(--err); font-size: 12px; padding: 0.15rem 0; }
  table { border-collapse: collapse; }
  th, td {
    border: 1px solid var(--rule); padding: 0.15rem 0.5rem; text-align: right;
    white-space: pre; min-width: 2.8rem; height: 1.6rem;
  }
  thead th, td.rownum {
    background: var(--head-bg); color: var(--head); text-align: center; font-weight: 500;
    position: sticky; top: 0;
  }
  td.rownum { position: sticky; left: 0; top: auto; text-align: right; }
  td.cell { cursor: cell; }
  td.cell:hover { outline: 1px solid var(--accent); outline-offset: -1px; }
  td.formula { background: var(--formula); border-left: 2px solid var(--formula-mark); }
  td.embed { background: var(--embed-bg); border-left: 2px solid var(--embed); }
  td.embed::after { content: " ⧉"; color: var(--embed); font-size: 10px; }
  .embedpanel { display: none; border-top: 1px solid var(--rule-strong); padding: 0.5rem 1rem 0.8rem; max-height: 40%; overflow: auto; }
  .embedpanel.on { display: block; }
  .embedpanel .title { color: var(--embed); font-size: 12px; font-weight: 600; margin-bottom: 0.4rem; }
  .embedpanel .title .path { color: var(--head); font-weight: 400; }
  .embedpanel table td { border-color: var(--rule); }
  .embedpanel .out { background: var(--dependent-bg); box-shadow: inset 0 0 0 2px var(--dependent); }
  td.err { background: var(--err-bg); color: var(--err); }
  td.selected { outline: 2px solid var(--accent); outline-offset: -2px; z-index: 1; }
  td.precedent { background: var(--precedent-bg); box-shadow: inset 0 0 0 2px var(--accent); }
  td.dependent { background: var(--dependent-bg); box-shadow: inset 0 0 0 2px var(--dependent); }
  .tools { display: inline-flex; gap: 0.25rem; }
  .tools button { padding: 0.25rem 0.5rem; font-size: 11px; }
  .reflegend { color: var(--head); font-size: 11px; display: none; gap: 0.9rem; align-items: center; }
  .reflegend.on { display: inline-flex; }
  .reflegend .swatch { display: inline-block; width: 0.7rem; height: 0.7rem; border-radius: 2px; vertical-align: -1px; margin-right: 0.3rem; }
  .reflegend .swatch.prec { background: var(--precedent-bg); box-shadow: inset 0 0 0 2px var(--accent); }
  .reflegend .swatch.dep { background: var(--dependent-bg); box-shadow: inset 0 0 0 2px var(--dependent); }
  td input {
    font-family: var(--mono); font-size: 13px; width: 100%; border: none;
    background: transparent; color: var(--ink); text-align: right; padding: 0;
  }
  td input:focus { outline: none; }
  .empty-hint { color: var(--head); padding: 2rem; }
</style>
</head>
<body>
<header>
  <span class="mark">tsv<b>sheet</b></span>
  <span class="hint">arrows move · Enter edits · a cell is a value, an =formula, or =sheet(…) embedding another sheet</span>
  <span id="reflegend" class="reflegend">
    <span><span class="swatch prec"></span>reads</span>
    <span><span class="swatch dep"></span>read by</span>
  </span>
  <span class="spacer"></span>
  <span id="state" class="state">loading…</span>
  <span class="tools" role="group" aria-label="Structure">
    <button type="button" data-op="insert-row" title="Insert row above the selection">＋row</button>
    <button type="button" data-op="delete-row" title="Delete the selected row">－row</button>
    <button type="button" data-op="insert-col" title="Insert column left of the selection">＋col</button>
    <button type="button" data-op="delete-col" title="Delete the selected column">－col</button>
  </span>
  <button id="save" type="button">Save</button>
</header>
<div class="formula-bar">
  <span class="addr" id="addr">·</span>
  <input id="formula" type="text" spellcheck="false" placeholder="select a cell" aria-label="Cell source">
</div>
<main aria-label="Spreadsheet"><div id="grid"></div></main>
<div id="embedpanel" class="embedpanel" aria-live="polite"></div>
<div id="diagnostics" class="diagnostics" aria-live="polite"></div>
<script>
(() => {
  const ERR = /^#[A-Z]+\/?[A-Z0-9]*[!?]$/;
  const els = {
    grid: document.getElementById("grid"),
    formula: document.getElementById("formula"),
    addr: document.getElementById("addr"),
    diagnostics: document.getElementById("diagnostics"),
    state: document.getElementById("state"),
    save: document.getElementById("save"),
    reflegend: document.getElementById("reflegend"),
    embedpanel: document.getElementById("embedpanel"),
  };
  const EMBED = /^=\s*sheet\s*\(/i;
  let sheet = { computed: [], source: [] };
  let sel = { row: 0, col: 0 };

  const colLabel = (n) => {
    let s = "";
    for (n += 1; n > 0; n = Math.floor((n - 1) / 26)) s = String.fromCharCode(65 + (n - 1) % 26) + s;
    return s;
  };
  const a1 = (row, col) => colLabel(col) + (row + 1);
  const at = (g, r, c) => (g[r] && g[r][c] !== undefined ? g[r][c] : "");

  async function api(method, path, body) {
    const res = await fetch(path, {
      method,
      headers: body ? { "Content-Type": "application/json" } : undefined,
      body: body ? JSON.stringify(body) : undefined,
    });
    const payload = await res.json();
    if (!res.ok) throw new Error(payload.error || res.statusText);
    return payload;
  }

  function width(state) {
    return state.computed.concat(state.source).reduce((w, row) => Math.max(w, row.length), 0);
  }

  function render(state) {
    sheet = state;
    const w = width(state);
    if (!state.computed.length && !w) {
      els.grid.innerHTML = '<p class="empty-hint">Empty sheet. Click a cell and type a value or an =formula.</p>';
    } else {
      renderGrid(state, w);
    }
    renderSelection();
    highlightReferences(sel.row, sel.col);
    showEmbedded(sel.row, sel.col);
    renderDiagnostics(state.diagnostics);
    els.state.textContent = state.dirty ? "unsaved changes" : "saved";
    els.state.classList.toggle("dirty", state.dirty);
  }

  function renderGrid(state, w) {
    const table = document.createElement("table");
    const head = document.createElement("thead");
    const hr = document.createElement("tr");
    hr.append(th(""));
    for (let c = 0; c < w; c++) hr.append(th(colLabel(c)));
    head.append(hr);
    table.append(head);
    for (let r = 0; r < state.computed.length; r++) table.append(bodyRow(state, r, w));
    els.grid.replaceChildren(table);
  }

  function th(text) {
    const el = document.createElement("th");
    el.textContent = text;
    return el;
  }

  function bodyRow(state, r, w) {
    const tr = document.createElement("tr");
    const num = document.createElement("td");
    num.className = "rownum";
    num.textContent = r + 1;
    tr.append(num);
    for (let c = 0; c < w; c++) tr.append(cell(state, r, c));
    return tr;
  }

  function cell(state, r, c) {
    const td = document.createElement("td");
    const value = at(state.computed, r, c);
    const src = at(state.source, r, c);
    td.textContent = value;
    td.className = "cell";
    if (src.startsWith("=")) td.classList.add("formula");
    if (EMBED.test(src)) td.classList.add("embed");
    if (ERR.test(value)) td.classList.add("err");
    td.dataset.row = r;
    td.dataset.col = c;
    td.addEventListener("click", () => select(r, c));
    td.addEventListener("dblclick", () => editInCell(td, r, c));
    return td;
  }

  function select(r, c) {
    sel = { row: r, col: c };
    renderSelection();
    els.formula.value = at(sheet.source, r, c);
    highlightReferences(r, c);
    showEmbedded(r, c);
  }

  // showEmbedded renders the nested sub-sheet of a =sheet(...) cell in a panel,
  // marking that sub-sheet's OUTPUT cell; a non-embed cell hides the panel.
  async function showEmbedded(r, c) {
    if (!EMBED.test(at(sheet.source, r, c))) { els.embedpanel.classList.remove("on"); return; }
    let emb;
    try { emb = await api("GET", `/api/embedded?cell=${a1(r, c)}`); }
    catch { els.embedpanel.classList.remove("on"); return; }
    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = `⧉ embedded sheet <span class="path"></span>`;
    title.querySelector(".path").textContent = emb.path;
    const table = document.createElement("table");
    (emb.grid || []).forEach((row) => {
      const tr = document.createElement("tr");
      (row || []).forEach((v) => {
        const td = document.createElement("td");
        td.textContent = v;
        if (ERR.test(v)) td.classList.add("err");
        tr.append(td);
      });
      table.append(tr);
    });
    els.embedpanel.replaceChildren(title, table);
    els.embedpanel.classList.add("on");
  }

  function renderSelection() {
    els.grid.querySelectorAll("td.selected").forEach((td) => td.classList.remove("selected"));
    const td = tdAt(sel.row, sel.col);
    if (td) { td.classList.add("selected"); td.scrollIntoView({ block: "nearest", inline: "nearest" }); }
    els.addr.textContent = a1(sel.row, sel.col);
  }

  const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
  const MOVES = { ArrowUp: [-1, 0], ArrowDown: [1, 0], ArrowLeft: [0, -1], ArrowRight: [0, 1] };

  // Keyboard navigation: arrows move the selection, Enter edits the cell — but
  // only when no input is focused (so typing in a field is untouched).
  document.addEventListener("keydown", (e) => {
    if (document.activeElement && document.activeElement.tagName === "INPUT") return;
    const rows = sheet.computed.length;
    const cols = width(sheet);
    if (MOVES[e.key]) {
      e.preventDefault();
      const [dr, dc] = MOVES[e.key];
      select(clamp(sel.row + dr, 0, rows - 1), clamp(sel.col + dc, 0, cols - 1));
    } else if (e.key === "Enter") {
      e.preventDefault();
      const td = tdAt(sel.row, sel.col);
      if (td) editInCell(td, sel.row, sel.col);
    }
  });

  const tdAt = (r, c) => els.grid.querySelector(`td[data-row="${r}"][data-col="${c}"]`);

  function markSpan(from, to, cls) {
    for (let r = Math.min(from.row, to.row); r <= Math.max(from.row, to.row); r++)
      for (let c = Math.min(from.col, to.col); c <= Math.max(from.col, to.col); c++)
        tdAt(r, c)?.classList.add(cls);
  }

  // highlightReferences paints the selected cell's precedents (cells it reads)
  // and dependents (cells that read it), fetched from the engine.
  async function highlightReferences(r, c) {
    els.grid.querySelectorAll("td.precedent, td.dependent")
      .forEach((td) => td.classList.remove("precedent", "dependent"));
    let refs;
    try { refs = await api("GET", `/api/references?cell=${a1(r, c)}`); }
    catch { els.reflegend.classList.remove("on"); return; }
    const prec = refs.precedents || [], deps = refs.dependents || [];
    prec.forEach((s) => markSpan(s.from, s.to, "precedent"));
    deps.forEach((d) => markSpan(d, d, "dependent"));
    els.reflegend.classList.toggle("on", prec.length + deps.length > 0);
  }

  async function commit(r, c, text) {
    try {
      render(await api("PUT", "/api/cell", { row: r, col: c, text }));
      select(r, c);
    } catch (err) {
      reportError(err);
    }
  }

  function editInCell(td, r, c) {
    const input = document.createElement("input");
    input.value = at(sheet.source, r, c);
    td.replaceChildren(input);
    input.focus();
    input.select();
    input.addEventListener("blur", () => commit(r, c, input.value));
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") input.blur();
      if (e.key === "Escape") { input.value = at(sheet.source, r, c); input.blur(); }
    });
  }

  els.formula.addEventListener("keydown", (e) => {
    if (e.key === "Enter") commit(sel.row, sel.col, els.formula.value);
    if (e.key === "Escape") els.formula.value = at(sheet.source, sel.row, sel.col);
  });

  function renderDiagnostics(diags) {
    els.diagnostics.replaceChildren(...(diags || []).map((d) => {
      const el = document.createElement("div");
      el.className = "diag";
      el.textContent = `${d.cell}: ${d.message}`;
      return el;
    }));
  }

  function reportError(err) {
    els.diagnostics.replaceChildren(Object.assign(document.createElement("div"), {
      className: "diag", textContent: err.message,
    }));
  }

  // structure applies a row/column insert or delete relative to the selection.
  async function structure(op) {
    try {
      render(await api("POST", "/api/structure", { op, row: sel.row, col: sel.col }));
      select(sel.row, sel.col);
    } catch (err) {
      reportError(err);
    }
  }

  document.querySelectorAll(".tools button").forEach((btn) =>
    btn.addEventListener("click", () => structure(btn.dataset.op)));

  els.save.addEventListener("click", async () => {
    try {
      await api("POST", "/api/save");
      render(await api("GET", "/api/state"));
    } catch (err) {
      reportError(err);
    }
  });

  api("GET", "/api/state").then(render).catch(reportError);
})();
</script>
</body>
</html>
