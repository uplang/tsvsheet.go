# Capabilities and their dependencies — machine-readable.
capabilities:
  engine-parse:
    depends_on: []
    contracts: [engine-api]
    status: planned

  engine-compute:
    depends_on: [engine-parse]
    contracts: [engine-api]
    status: planned

  session:
    depends_on: [engine-parse, engine-compute]
    contracts: [engine-api]
    status: planned

  cli:
    depends_on: [engine-parse, engine-compute]
    contracts: [engine-api]
    status: planned

  # content-typed HTTP import of external values (ADR 0006): five IMPORT*
  # builtins over an injected Fetcher. Engine-level (new builtins + #IMPORT! +
  # HasImports), with the real net/http Fetcher and refresh controls layered in
  # the frontends.
  import:
    depends_on: [engine-parse, engine-compute]
    contracts: [engine-api]
    status: planned

  # serve and tui mount as subcommands of the one cmd/tsvsheet binary, so they
  # depend on cli for the urfave/cli command shell as well as on session.
  serve:
    depends_on: [session, cli]
    contracts: [engine-api]
    status: planned

  tui:
    depends_on: [session, cli]
    contracts: [engine-api]
    status: planned
